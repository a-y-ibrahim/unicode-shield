    <rect x="64" width="46" height="20" fill="#4c1"/>
    <rect width="110" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" direction="rtl" font-family="'Segoe UI','Noto Sans Arabic','Tahoma','DejaVu Sans',Verdana,sans-serif" font-size="11">
