name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      # No "version" input: pnpm/action-setup reads the exact pinned
      # version from package.json's "packageManager" field instead, see
      # the same step in ci.yml for why a loose range broke CI.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install

      - run: pnpm run typecheck

      - run: pnpm run lint

      - run: pnpm test

      - run: pnpm run build

      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
