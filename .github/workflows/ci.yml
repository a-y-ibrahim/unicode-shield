name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # pnpm 11 (the version pinned locally, matching pnpm-lock.yaml) requires
    # Node >=22.13 to run at all, so a single, current Node version is used
    # here rather than a matrix. The published package still declares and
    # supports Node >=18 for consumers, see package.json engines, this only
    # affects which Node version can run the dev toolchain (pnpm/vite/vitest).
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm run typecheck

      - run: pnpm run lint

      - run: pnpm test

      - run: pnpm run build
