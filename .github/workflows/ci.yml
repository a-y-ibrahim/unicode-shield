name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Dev tooling (vite/vitest) needs Node >=20; the published package
        # itself still supports Node >=18, see package.json engines.
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install

      - run: pnpm run typecheck

      - run: pnpm run lint

      - run: pnpm test

      - run: pnpm run build
